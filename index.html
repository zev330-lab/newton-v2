<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B2A4A">
<title>Newton Investment Analyzer</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1B2A4A;--bg-light:#243556;--bg-lighter:#2d4068;--accent:#D4A843;--accent-dim:rgba(212,168,67,0.15);--text:#E8E6E3;--text-dim:#9CA3AF;--text-muted:#6B7280;--success:#4ADE80;--danger:#F87171;--warning:#FBBF24;--radius:8px;--font:'Inter',system-ui,sans-serif}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{display:flex;flex-direction:column}
input,select,textarea,button{font-family:var(--font);font-size:14px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg-lighter);border-radius:3px}
.rotate-screen{position:fixed;inset:0;background:var(--bg);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.rotate-screen svg{width:80px;height:80px;fill:var(--accent);margin-bottom:1rem}
.rotate-screen h1{font-size:1.5rem;color:var(--accent);margin-bottom:.5rem}
.rotate-screen p{color:var(--text-dim);margin-bottom:1.5rem;font-size:.9rem}
.rotate-screen .phone-icon{width:50px;height:50px;margin:1rem 0;animation:rotatePhone 2s ease-in-out infinite}
@keyframes rotatePhone{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}
.rotate-screen .continue-link{color:var(--accent);text-decoration:underline;cursor:pointer;font-size:.85rem;margin-top:1rem}
.guide-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9000;display:flex;align-items:center;justify-content:center}
.guide-card{background:var(--bg-light);border:1px solid var(--accent);border-radius:12px;max-width:500px;width:90%;padding:2rem;text-align:center;position:relative}
.guide-card h2{color:var(--accent);font-size:1.3rem;margin-bottom:1rem}
.guide-card p{color:var(--text-dim);line-height:1.6;font-size:.9rem;margin-bottom:1rem}
.guide-card .guide-nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem}
.guide-card .guide-dots{display:flex;gap:6px}
.guide-card .guide-dots span{width:8px;height:8px;border-radius:50%;background:var(--bg-lighter);transition:background .3s}
.guide-card .guide-dots span.active{background:var(--accent)}
.guide-card button{background:var(--accent);color:var(--bg);border:none;padding:8px 20px;border-radius:var(--radius);font-weight:600;cursor:pointer;font-size:.85rem}
.guide-card button.secondary{background:transparent;color:var(--text-dim);border:1px solid var(--bg-lighter)}
.guide-card .close-btn{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--text-dim);font-size:1.2rem;cursor:pointer}
#app{display:flex;flex-direction:column;height:100%;overflow:hidden}
.toolbar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg-light);border-bottom:1px solid var(--bg-lighter);flex-shrink:0;min-height:44px}
.toolbar .logo{display:flex;align-items:center;gap:6px}
.toolbar .logo svg{width:22px;height:22px;fill:var(--accent)}
.toolbar .logo span{font-weight:700;font-size:.85rem;color:var(--accent);white-space:nowrap}
.toolbar .search-wrap{flex:1;max-width:280px;position:relative}
.toolbar .search-wrap input{width:100%;padding:6px 10px 6px 30px;border-radius:var(--radius);border:1px solid var(--bg-lighter);background:var(--bg);color:var(--text);font-size:.8rem;outline:none}
.toolbar .search-wrap input:focus{border-color:var(--accent)}
.toolbar .search-wrap svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:14px;height:14px;fill:var(--text-muted)}
.toolbar .filter-group{display:flex;gap:4px;align-items:center}
.toolbar select{padding:5px 8px;border-radius:var(--radius);border:1px solid var(--bg-lighter);background:var(--bg);color:var(--text);font-size:.75rem;outline:none;cursor:pointer}
.toolbar .shortlist-btn{background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);padding:5px 12px;border-radius:var(--radius);font-size:.75rem;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
.toolbar .shortlist-btn.active{background:var(--accent);color:var(--bg)}
.toolbar .compare-btn{background:transparent;border:1px solid var(--accent);color:var(--accent);padding:5px 10px;border-radius:var(--radius);font-size:.75rem;font-weight:600;cursor:pointer;white-space:nowrap}
.toolbar .compare-btn:disabled{opacity:.4;cursor:not-allowed}
.stats-bar{display:flex;gap:12px;padding:4px 12px;background:var(--bg);border-bottom:1px solid var(--bg-lighter);font-size:.7rem;color:var(--text-dim);flex-shrink:0}
.stats-bar span{white-space:nowrap}
.stats-bar .accent{color:var(--accent);font-weight:600}
.table-wrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.75rem}
thead{position:sticky;top:0;z-index:10}
thead th{background:var(--bg-light);color:var(--accent);font-weight:600;padding:8px 10px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:2px solid var(--bg-lighter);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px}
thead th:hover{background:var(--bg-lighter)}
thead th .sort-icon{margin-left:4px;font-size:.6rem;opacity:.5}
thead th.sorted .sort-icon{opacity:1;color:var(--accent)}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background .15s}
tbody tr:hover{background:var(--accent-dim)}
tbody td{padding:7px 10px;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.star-cell{width:30px;text-align:center;cursor:pointer}
.star-cell svg{width:16px;height:16px;fill:var(--text-muted);transition:fill .2s}
.star-cell.starred svg{fill:var(--accent)}
.grade{display:inline-block;padding:2px 8px;border-radius:4px;font-weight:700;font-size:.7rem;min-width:24px;text-align:center}
.grade-A{background:rgba(74,222,128,0.2);color:#4ADE80}
.grade-B{background:rgba(96,165,250,0.2);color:#60A5FA}
.grade-C{background:rgba(251,191,36,0.2);color:#FBBF24}
.grade-D{background:rgba(251,146,60,0.2);color:#FB923C}
.grade-F{background:rgba(248,113,113,0.2);color:#F87171}
.score-bar{display:flex;align-items:center;gap:4px}
.score-bar .bar{width:48px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.score-bar .bar .fill{height:100%;border-radius:3px;transition:width .3s}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:5000;display:flex;align-items:center;justify-content:center;padding:8px}
.modal{background:var(--bg-light);border:1px solid var(--accent);border-radius:12px;width:100%;max-width:900px;max-height:95vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:12px 16px;border-bottom:1px solid var(--bg-lighter);display:flex;justify-content:space-between;align-items:flex-start}
.modal-header .prop-info h2{font-size:1rem;color:var(--accent);margin-bottom:2px}
.modal-header .prop-info p{font-size:.75rem;color:var(--text-dim)}
.modal-header .close-modal{background:none;border:none;color:var(--text-dim);font-size:1.4rem;cursor:pointer;padding:0 4px}
.strategy-tabs{display:flex;border-bottom:1px solid var(--bg-lighter);flex-shrink:0}
.strategy-tabs button{flex:1;padding:8px;background:transparent;border:none;color:var(--text-dim);font-size:.75rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.strategy-tabs button.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--accent-dim)}
.modal-body{flex:1;overflow-y:auto;padding:12px 16px;-webkit-overflow-scrolling:touch}
.inputs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
@media(max-width:700px){.inputs-grid{grid-template-columns:repeat(2,1fr)}}
.input-group{display:flex;flex-direction:column;gap:2px}
.input-group label{font-size:.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
.input-group input{padding:6px 8px;border-radius:var(--radius);border:1px solid var(--bg-lighter);background:var(--bg);color:var(--text);font-size:.85rem;outline:none;width:100%;-webkit-appearance:none;appearance:none}
.input-group input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(212,168,67,0.2)}
.recalc-btn{width:100%;padding:8px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--radius);font-weight:700;font-size:.8rem;cursor:pointer;margin-bottom:16px}
.recalc-btn:active{transform:scale(0.98)}
.results-section h3{font-size:.8rem;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.results-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:12px}
.result-card{background:var(--bg);border:1px solid var(--bg-lighter);border-radius:var(--radius);padding:10px}
.result-card .label{font-size:.65rem;color:var(--text-dim);text-transform:uppercase;margin-bottom:2px}
.result-card .value{font-size:1rem;font-weight:700;color:var(--text)}
.result-card .value.positive{color:var(--success)}
.result-card .value.negative{color:var(--danger)}
.compare-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:6000;display:flex;align-items:center;justify-content:center;padding:8px}
.compare-panel{background:var(--bg-light);border:1px solid var(--accent);border-radius:12px;width:100%;max-width:95vw;max-height:95vh;overflow:auto;padding:16px}
.compare-panel h2{color:var(--accent);font-size:1rem;margin-bottom:12px}
.compare-panel .close-modal{float:right;background:none;border:none;color:var(--text-dim);font-size:1.4rem;cursor:pointer}
.compare-table{width:100%;border-collapse:collapse;font-size:.75rem}
.compare-table th{text-align:left;padding:6px 10px;color:var(--accent);background:var(--bg);border-bottom:1px solid var(--bg-lighter);font-size:.7rem}
.compare-table td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.04)}
.shortlist-panel{position:fixed;top:0;right:0;width:320px;height:100%;background:var(--bg-light);border-left:1px solid var(--accent);z-index:4000;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s}
.shortlist-panel.open{transform:translateX(0)}
.shortlist-panel .panel-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--bg-lighter)}
.shortlist-panel .panel-header h3{color:var(--accent);font-size:.9rem}
.shortlist-panel .panel-header button{background:none;border:none;color:var(--text-dim);font-size:1.2rem;cursor:pointer}
.shortlist-panel .panel-body{flex:1;overflow-y:auto;padding:8px}
.shortlist-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer}
.shortlist-item:hover{background:var(--accent-dim)}
.shortlist-item .addr{font-size:.8rem;font-weight:500}
.shortlist-item .meta{font-size:.7rem;color:var(--text-dim)}
.shortlist-item .remove-btn{background:none;border:none;color:var(--danger);cursor:pointer;font-size:.9rem}
.shortlist-empty{text-align:center;padding:2rem;color:var(--text-muted);font-size:.8rem}
.help-btn{position:fixed;bottom:12px;right:12px;width:36px;height:36px;border-radius:50%;background:var(--accent);color:var(--bg);border:none;font-size:1.1rem;font-weight:700;cursor:pointer;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
</style>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" src="app.js"></script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
</html>
